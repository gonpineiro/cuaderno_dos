services:
    server:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - 8000:80
        networks:
            - app-network
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    db:
        image: mysql:5.7.33
        restart: unless-stopped
        ports:
            - 3307:3306
        environment:
            MYSQL_DATABASE: $DB_DATABASE
            MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
            MYSQL_PASSWORD: $DB_PASSWORD
        networks:
            - app-network
        volumes:
            - dbdata:/var/lib/mysql

    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        networks:
            - app-network
        volumes:
            - ./:/var/www
        ports:
            - 9006:9005

networks:
    app-network:
        driver: bridge

volumes:
    dbdata:
